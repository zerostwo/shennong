name: R-CMD-check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::Seurat
            any::SeuratObject
            github::carmonalab/SignatuR
            github::immunogenomics/harmony@harmony2
            any::HGNChelper
            any::rio
            any::anndataR
            any::hdf5r
            any::data.table
            github::genecell/COSGR
            bioc::SingleCellExperiment
            bioc::SummarizedExperiment
            bioc::celda
            bioc::limma
            bioc::scran
            bioc::scDblFinder
            bioc::rhdf5
            bioc::rtracklayer
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          build_args: 'c("--no-manual")'
