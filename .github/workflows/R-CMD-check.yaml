name: R-CMD-check

on:
  push:
    branches:
      - main
    paths:
      - 'R/**'
      - 'data/**'
      - 'inst/**'
      - 'man/**'
      - 'tests/**'
      - 'vignettes/**'
      - 'DESCRIPTION'
      - 'NAMESPACE'
      - '.Rbuildignore'
      - '.github/workflows/R-CMD-check.yaml'
  pull_request:
    paths:
      - 'R/**'
      - 'data/**'
      - 'inst/**'
      - 'man/**'
      - 'tests/**'
      - 'vignettes/**'
      - 'DESCRIPTION'
      - 'NAMESPACE'
      - '.Rbuildignore'
      - '.github/workflows/R-CMD-check.yaml'
  workflow_dispatch:
    inputs:
      full_tests:
        description: Run tests again inside R CMD check for a release audit
        required: false
        default: false
        type: boolean

concurrency:
  group: R-CMD-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::Seurat
            any::SeuratObject
            github::carmonalab/SignatuR
            github::immunogenomics/harmony@harmony2
            any::HGNChelper
            any::leidenbase
            any::rio
            any::anndataR
            any::hdf5r
            any::data.table
            github::genecell/COSGR
            bioc::SingleCellExperiment
            bioc::SummarizedExperiment
            bioc::celda
            bioc::limma
            bioc::scran
            bioc::scDblFinder
            bioc::rhdf5
            bioc::rtracklayer
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: ${{ (github.event_name == 'workflow_dispatch' && inputs.full_tests) && 'c("--no-manual", "--as-cran")' || 'c("--no-manual", "--as-cran", "--no-tests")' }}
          build_args: '"--no-manual"'
