name: test-coverage

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::covr
            any::testthat
            any::Seurat
            any::SeuratObject
            any::harmony
            any::HGNChelper
            any::rio
            any::anndataR
            any::hdf5r
            any::data.table
            any::clusterProfiler
            github::catplot/catplot
            bioc::org.Hs.eg.db
            bioc::SingleCellExperiment
            bioc::SummarizedExperiment
            bioc::celda
            bioc::scran
            bioc::scDblFinder
            bioc::rhdf5
            bioc::rtracklayer
            bioc::DESeq2
            bioc::edgeR

      - name: Test coverage
        run: covr::codecov(quiet = FALSE)
        shell: Rscript {0}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
