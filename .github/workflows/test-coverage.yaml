name: test-coverage

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::covr
            any::xml2
            any::testthat
            any::Seurat
            any::SeuratObject
            github::carmonalab/SignatuR
            github::immunogenomics/harmony@harmony2
            any::HGNChelper
            any::rio
            any::anndataR
            any::hdf5r
            any::data.table
            any::clusterProfiler
            github::catplot/catplot
            github::genecell/COSGR
            bioc::org.Hs.eg.db
            bioc::SingleCellExperiment
            bioc::SummarizedExperiment
            bioc::celda
            bioc::limma
            bioc::scran
            bioc::scDblFinder
            bioc::rhdf5
            bioc::rtracklayer
            bioc::DESeq2
            bioc::edgeR

      - name: Test coverage
        run: |
          cov <- covr::package_coverage()
          covr::to_cobertura(cov, filename = "coverage.xml")
        shell: Rscript {0}

      - uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          use_oidc: true
