name: pkgdown

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      SHENNONG_RUN_VIGNETTES: true
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::pkgdown
            any::knitr
            any::rmarkdown
            github::tidyverse/tidytemplate
            any::Seurat
            any::hdf5r
            any::qs2
            any::rio
            any::zen4R
            github::carmonalab/SignatuR
            github::immunogenomics/harmony@harmony2
            any::clusterProfiler
            bioc::org.Hs.eg.db
            any::HGNChelper
            github::catplot/catplot
            github::immunogenomics/lisi
          needs: website

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: Install package
        run: R CMD INSTALL .
        shell: bash

      - name: Build site
        run: |
          set +e
          Rscript -e 'pkgdown::build_site(new_process = FALSE, install = FALSE)' > pkgdown.log 2>&1
          status=$?
          cat pkgdown.log
          if [ "$status" -ne 0 ]; then
            tail_msg=$(tail -n 80 pkgdown.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=pkgdown build failed::$tail_msg"
            exit "$status"
          fi
        shell: bash
