[workspace]
name = "shennong-mmochi"
channels = ["conda-forge"]
platforms = ["{{ platform }}"]

[dependencies]
python = ">=3.10,<3.13"
anndata = ">=0.10"
scanpy = ">=1.10"
pandas = ">=2"
numpy = ">=1.23"
scipy = ">=1.10"
scikit-learn = ">=1.1"
scikit-fda = ">=0.5"
imbalanced-learn = ">=0.11"
seaborn = ">=0.11"
matplotlib = ">=3.6"
tqdm = ">=4.64"
treelib = ">=1.6"
pydot = ">=1.4"
ipython = ">=8.4"
ipywidgets = ">=7.7"
leidenalg = ">=0.8"
pip = "*"

[pypi-dependencies]
mmochi = { git = "https://github.com/donnafarberlab/MMoCHi.git" }
