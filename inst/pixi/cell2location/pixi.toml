[workspace]
name = "shennong-cell2location"
channels = ["conda-forge"]
platforms = ["{{ platform }}"]

[dependencies]
python = ">=3.10,<3.12"
scanpy = ">=1.10"
anndata = ">=0.10"
scvi-tools = ">=1.2"
pandas = ">=2"
scipy = ">=1.10"
numpy = "*"

[pypi-dependencies]
cell2location = "*"

[feature.cpu.dependencies]
pytorch-cpu = "*"

[feature.gpu.system-requirements]
cuda = "{{ cuda_major }}"

[feature.gpu.dependencies]
pytorch-gpu = "*"
cuda-version = "{{ cuda_version }}.*"

[environments]
cpu = ["cpu"]
gpu = ["gpu"]
default = ["cpu"]

